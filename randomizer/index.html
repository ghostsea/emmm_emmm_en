<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SETI 太阳系随机器</title>
  <link rel="stylesheet" href="./style.css?v=amiba-7">
</head>
<body>
  <div class="app-wrap debug-collapsed log-collapsed" id="app-wrap">
    <aside class="table-column table-column-left" aria-label="左侧游戏区域">
      <section class="round-status-panel" aria-label="轮次信息">
        <div class="round-status-frame">
          <img class="round-status-bg" src="../assets/core/rotate.png" alt="" width="1984" height="2122" decoding="async" aria-hidden="true">
          <img
            class="round-status-token"
            id="round-status-token"
            src="../assets/tokens/rotate_state.png"
            alt=""
            width="512"
            height="512"
            decoding="async"
            aria-hidden="true"
          >
          <div class="round-status-circle">
            <span class="round-status-value" id="round-status-round">第 1 轮</span>
            <span class="round-status-value round-status-turn" id="round-status-turn">第 1 回合</span>
          </div>
        </div>
      </section>

      <section class="table-panel final-score-panel" aria-label="终局计分">
        <div class="panel-title">终局计分</div>
        <div class="final-score-grid" id="final-score-grid">
          <button class="final-score-tile-wrap" type="button" data-final-id="a" aria-label="终局计分 A">
            <img class="final-score-tile" data-final-id="a" src="../assets/final/final_a1.png" alt="终局计分 A1" width="747" height="1040" decoding="async">
            <span class="final-score-token-layer" aria-hidden="true"></span>
          </button>
          <button class="final-score-tile-wrap" type="button" data-final-id="b" aria-label="终局计分 B">
            <img class="final-score-tile" data-final-id="b" src="../assets/final/final_b1.png" alt="终局计分 B1" width="747" height="1040" decoding="async">
            <span class="final-score-token-layer" aria-hidden="true"></span>
          </button>
          <button class="final-score-tile-wrap" type="button" data-final-id="c" aria-label="终局计分 C">
            <img class="final-score-tile" data-final-id="c" src="../assets/final/final_c1.png" alt="终局计分 C1" width="747" height="1040" decoding="async">
            <span class="final-score-token-layer" aria-hidden="true"></span>
          </button>
          <button class="final-score-tile-wrap" type="button" data-final-id="d" aria-label="终局计分 D">
            <img class="final-score-tile" data-final-id="d" src="../assets/final/final_d1.png" alt="终局计分 D1" width="747" height="1040" decoding="async">
            <span class="final-score-token-layer" aria-hidden="true"></span>
          </button>
        </div>
      </section>

      <section class="table-panel alien-panel" aria-label="外星人 1" data-alien-slot="1">
        <div class="alien-jiuzhe-thresholds" data-alien-slot="1" hidden></div>
        <div class="alien-banrenma-scoremarks" data-alien-slot="1" hidden></div>
        <div class="alien-stack">
          <div class="alien-face-wrap">
            <img class="alien-back" src="../assets/aliens/back.png" alt="外星人 1 牌背" width="777" height="1415" decoding="async">
            <div class="alien-jiuzhe-trace-layer" data-alien-slot="1" aria-hidden="true"></div>
          </div>
          <div class="alien-state-wrap">
            <img class="alien-state" src="../assets/aliens/state1.png" alt="外星人 1 状态" width="443" height="208" decoding="async">
            <div class="alien-trace-layer" data-alien-slot="1" aria-hidden="true"></div>
          </div>
          <div class="alien-yichangdian-card-area" data-alien-slot="1" hidden></div>
          <div class="alien-fangzhou-card-area" data-alien-slot="1" hidden></div>
          <div class="alien-banrenma-card-area" data-alien-slot="1" hidden></div>
          <div class="alien-chong-card-area" data-alien-slot="1" hidden></div>
          <div class="alien-amiba-card-area" data-alien-slot="1" hidden></div>
          <div class="alien-aomomo-card-area" data-alien-slot="1" hidden></div>
          <div class="alien-runezu-card-area" data-alien-slot="1" hidden></div>
        </div>
      </section>

      <section class="table-panel alien-panel" aria-label="外星人 2" data-alien-slot="2">
        <div class="alien-jiuzhe-thresholds" data-alien-slot="2" hidden></div>
        <div class="alien-banrenma-scoremarks" data-alien-slot="2" hidden></div>
        <div class="alien-stack">
          <div class="alien-face-wrap">
            <img class="alien-back" src="../assets/aliens/back.png" alt="外星人 2 牌背" width="777" height="1415" decoding="async">
            <div class="alien-jiuzhe-trace-layer" data-alien-slot="2" aria-hidden="true"></div>
          </div>
          <div class="alien-state-wrap">
            <img class="alien-state" src="../assets/aliens/state2.png" alt="外星人 2 状态" width="443" height="208" decoding="async">
            <div class="alien-trace-layer" data-alien-slot="2" aria-hidden="true"></div>
          </div>
          <div class="alien-yichangdian-card-area" data-alien-slot="2" hidden></div>
          <div class="alien-fangzhou-card-area" data-alien-slot="2" hidden></div>
          <div class="alien-banrenma-card-area" data-alien-slot="2" hidden></div>
          <div class="alien-chong-card-area" data-alien-slot="2" hidden></div>
          <div class="alien-amiba-card-area" data-alien-slot="2" hidden></div>
          <div class="alien-aomomo-card-area" data-alien-slot="2" hidden></div>
          <div class="alien-runezu-card-area" data-alien-slot="2" hidden></div>
        </div>
      </section>
    </aside>

    <div class="tech-blue-slot-overlay" id="tech-blue-slot-overlay" hidden>
      <div class="tech-blue-slot-dialog" role="dialog" aria-modal="true" aria-labelledby="tech-blue-slot-title">
        <p class="tech-blue-slot-title" id="tech-blue-slot-title">选择蓝色科技放置位置</p>
        <p class="tech-blue-slot-subtitle" id="tech-blue-slot-subtitle"></p>
        <div class="tech-blue-slot-actions" id="tech-blue-slot-actions"></div>
        <button class="tech-blue-slot-cancel" type="button" id="tech-blue-slot-cancel">取消</button>
      </div>
    </div>

    <div class="tech-selection-backdrop" id="tech-selection-backdrop" hidden aria-hidden="true"></div>
    <div class="card-selection-backdrop" id="card-selection-backdrop" hidden aria-hidden="true"></div>
    <div class="discard-selection-backdrop" id="discard-selection-backdrop" hidden aria-hidden="true"></div>

    <div class="pass-reserve-selection-overlay" id="pass-reserve-selection-overlay" hidden aria-hidden="true">
      <div class="pass-reserve-selection-dialog" role="dialog" aria-modal="true" aria-labelledby="pass-reserve-selection-title">
        <div class="pass-reserve-selection-header">
          <div class="pass-reserve-selection-title" id="pass-reserve-selection-title">PASS 精选</div>
          <div class="pass-reserve-selection-subtitle" id="pass-reserve-selection-subtitle"></div>
        </div>
        <div class="pass-reserve-selection-grid" id="pass-reserve-selection-grid"></div>
        <div class="pass-reserve-selection-footer">
          <div class="pass-reserve-selection-status" id="pass-reserve-selection-status"></div>
          <button class="pass-reserve-selection-confirm" type="button" id="pass-reserve-selection-confirm" disabled>确认选择</button>
        </div>
      </div>
    </div>

    <div class="data-place-overlay" id="data-place-overlay" hidden>
      <div class="data-place-dialog" role="dialog" aria-modal="true" aria-labelledby="data-place-title">
        <p class="data-place-title" id="data-place-title">选择数据放置位置</p>
        <p class="data-place-subtitle" id="data-place-subtitle"></p>
        <div class="data-place-actions" id="data-place-actions"></div>
        <button class="data-place-cancel" type="button" id="data-place-cancel">取消</button>
      </div>
    </div>

    <div class="scan-target-overlay" id="scan-target-overlay" hidden>
      <div class="scan-target-dialog" role="dialog" aria-modal="true" aria-labelledby="scan-target-title">
        <p class="scan-target-title" id="scan-target-title">选择扫描目标</p>
        <p class="scan-target-subtitle" id="scan-target-subtitle"></p>
        <div class="scan-target-actions" id="scan-target-actions"></div>
        <button class="scan-target-cancel" type="button" id="scan-target-cancel">取消</button>
      </div>
    </div>

    <div class="scan-target-overlay" id="alien-trace-overlay" hidden>
      <div class="scan-target-dialog" role="dialog" aria-modal="true" aria-labelledby="alien-trace-title">
        <p class="scan-target-title" id="alien-trace-title">获取外星人标记</p>
        <p class="scan-target-subtitle" id="alien-trace-subtitle">选择外星人及痕迹颜色；首标记位空缺时自动放置，否则追加到额外痕迹位。</p>
        <div class="scan-target-actions" id="alien-trace-actions"></div>
        <button class="scan-target-cancel" type="button" id="alien-trace-cancel">取消</button>
      </div>
    </div>

    <div class="scan-action-4-overlay" id="scan-action-4-overlay" hidden>
      <div class="scan-target-dialog" role="dialog" aria-modal="true" aria-labelledby="scan-action-4-title">
        <p class="scan-target-title" id="scan-action-4-title">紫4扫描效果</p>
        <p class="scan-target-subtitle" id="scan-action-4-subtitle">选择发射或移动，或取消跳过此效果。</p>
        <div class="scan-target-actions" id="scan-action-4-actions"></div>
        <button class="scan-target-cancel" type="button" id="scan-action-4-cancel">取消</button>
      </div>
    </div>

    <div class="land-target-overlay" id="land-target-overlay" hidden>
      <div class="land-target-dialog" role="dialog" aria-modal="true" aria-labelledby="land-target-title">
        <p class="land-target-title" id="land-target-title">选择登陆目标</p>
        <label class="land-target-label" for="land-target-select">登陆到</label>
        <select class="land-target-select" id="land-target-select"></select>
        <div class="land-target-actions">
          <button class="land-target-button land-target-button-primary" type="button" id="land-target-confirm">确认登陆</button>
          <button class="land-target-button" type="button" id="land-target-cancel">取消</button>
        </div>
      </div>
    </div>

    <main class="board-column">
      <section class="player-command" id="player-command" aria-label="当前玩家">
        <div class="player-stats" id="player-stats" aria-live="polite"></div>
        <div class="action-bar" id="action-bar" aria-label="行动">
          <div class="action-bar-main" id="action-bar-main">
            <button class="action-button action-button-compact action-button-primary" type="button" id="action-launch-button" aria-label="发射">
              <img class="action-button-icon" src="../assets/symbol/effect/launch.webp" alt="" aria-hidden="true">
            </button>
            <button class="action-button action-button-compact" type="button" id="action-orbit-button" aria-label="环绕">
              <img class="action-button-icon" src="../assets/symbol/effect/orbit.webp" alt="" aria-hidden="true">
            </button>
            <button class="action-button action-button-compact" type="button" id="action-land-button" aria-label="登陆">
              <img class="action-button-icon" src="../assets/symbol/effect/land.webp" alt="" aria-hidden="true">
            </button>
            <button class="action-button action-button-compact" type="button" id="action-scan-button" aria-label="扫描">
              <img class="action-button-icon" src="../assets/symbol/effect/scan_action.webp" alt="" aria-hidden="true">
            </button>
            <button class="action-button action-button-compact" type="button" id="action-analyze-button" aria-label="分析">
              <img class="action-button-icon" src="../assets/symbol/effect/analyze_data.webp" alt="" aria-hidden="true">
            </button>
            <button class="action-button action-button-compact" type="button" id="action-play-card-button" aria-label="打牌">
              <img class="action-button-icon" src="../assets/symbol/effect/play_card.png" alt="" aria-hidden="true">
            </button>
            <button class="action-button action-button-compact" type="button" id="action-research-tech-button" aria-label="科技">
              <img class="action-button-icon" src="../assets/symbol/effect/research_tech.webp" alt="" aria-hidden="true">
            </button>
            <button class="action-button action-button-compact action-button-text" type="button" id="action-quick-button" aria-expanded="false" aria-controls="quick-actions-panel">快速</button>
          </div>
          <div class="action-bar-turn" id="action-bar-turn">
            <button class="action-button action-button-text" type="button" id="action-pass-button" disabled aria-label="本回合 PASS">PASS</button>
            <button class="action-button action-button-text" type="button" id="action-confirm-button" disabled aria-label="回合结束">回合结束</button>
            <button class="action-button action-button-text" type="button" id="action-undo-button" disabled aria-label="撤销行动">撤销</button>
          </div>
        </div>
        <div class="action-effect-bar" id="action-effect-bar" hidden aria-label="效果触发">
          <div class="action-effect-list" id="action-effect-list"></div>
          <button class="action-effect-skip-button" type="button" id="action-effect-skip-button" hidden aria-label="跳过当前效果">跳过</button>
        </div>
        <div class="quick-actions-panel" id="quick-actions-panel" hidden aria-label="快速行动">
          <div class="quick-actions-row">
            <span class="quick-actions-label">兑换</span>
            <div class="quick-actions-trades" id="quick-actions-trades">
              <button class="quick-trade-button" type="button" data-quick-trade="credits-for-energy" aria-label="2信用点换1能量">
                <span class="quick-trade-count">2</span>
                <img class="quick-trade-icon" src="../assets/symbol/effect/credits.webp" alt="" aria-hidden="true">
                <span class="quick-trade-arrow" aria-hidden="true">-&gt;</span>
                <img class="quick-trade-icon" src="../assets/symbol/effect/energy.webp" alt="" aria-hidden="true">
              </button>
              <button class="quick-trade-button" type="button" data-quick-trade="credits-for-card" aria-label="2信用点换1张牌">
                <span class="quick-trade-count">2</span>
                <img class="quick-trade-icon" src="../assets/symbol/effect/credits.webp" alt="" aria-hidden="true">
                <span class="quick-trade-arrow" aria-hidden="true">-&gt;</span>
                <img class="quick-trade-icon" src="../assets/symbol/effect/card.webp" alt="" aria-hidden="true">
              </button>
              <button class="quick-trade-button" type="button" data-quick-trade="cards-for-credit" aria-label="2张牌换1信用点">
                <span class="quick-trade-count">2</span>
                <img class="quick-trade-icon" src="../assets/symbol/effect/card.webp" alt="" aria-hidden="true">
                <span class="quick-trade-arrow" aria-hidden="true">-&gt;</span>
                <img class="quick-trade-icon" src="../assets/symbol/effect/credits.webp" alt="" aria-hidden="true">
              </button>
              <button class="quick-trade-button" type="button" data-quick-trade="cards-for-energy" aria-label="2张牌换1能量">
                <span class="quick-trade-count">2</span>
                <img class="quick-trade-icon" src="../assets/symbol/effect/card.webp" alt="" aria-hidden="true">
                <span class="quick-trade-arrow" aria-hidden="true">-&gt;</span>
                <img class="quick-trade-icon" src="../assets/symbol/effect/energy.webp" alt="" aria-hidden="true">
              </button>
              <button class="quick-trade-button" type="button" data-quick-trade="energy-for-card" aria-label="2能量换1张牌">
                <span class="quick-trade-count">2</span>
                <img class="quick-trade-icon" src="../assets/symbol/effect/energy.webp" alt="" aria-hidden="true">
                <span class="quick-trade-arrow" aria-hidden="true">-&gt;</span>
                <img class="quick-trade-icon" src="../assets/symbol/effect/card.webp" alt="" aria-hidden="true">
              </button>
              <button class="quick-trade-button" type="button" data-quick-trade="energy-for-credit" aria-label="2能量换1信用点">
                <span class="quick-trade-count">2</span>
                <img class="quick-trade-icon" src="../assets/symbol/effect/energy.webp" alt="" aria-hidden="true">
                <span class="quick-trade-arrow" aria-hidden="true">-&gt;</span>
                <img class="quick-trade-icon" src="../assets/symbol/effect/credits.webp" alt="" aria-hidden="true">
              </button>
              <button class="quick-trade-button" type="button" data-quick-trade="publicity-for-card" aria-label="3宣传精选1张牌">
                <span class="quick-trade-count">3</span>
                <img class="quick-trade-icon" src="../assets/symbol/effect/publicity.webp" alt="" aria-hidden="true">
                <span class="quick-trade-arrow" aria-hidden="true">-&gt;</span>
                <img class="quick-trade-icon" src="../assets/symbol/effect/choose_card.webp" alt="" aria-hidden="true">
              </button>
            </div>
          </div>
        </div>
        <div class="player-board-panel" id="player-board-panel" aria-label="玩家版图">
          <div class="player-board-stage" id="player-board-stage">
            <img class="player-board-image" src="../assets/core/player_board.png" alt="玩家版图" width="960" height="329" decoding="async">
            <div class="player-board-tech-layer" id="player-board-tech-layer" aria-hidden="true"></div>
            <div class="player-board-data-layer" id="player-board-data-layer" aria-hidden="true"></div>
          </div>
        </div>
        <section class="table-panel player-hand-panel" id="player-hand-panel" aria-label="玩家手牌区">
          <div class="player-hand-panel-header">
            <div class="panel-title player-hand-panel-title" id="player-hand-panel-title">
              <span class="player-hand-panel-title-label">玩家手牌区</span>
              <span class="player-hand-panel-title-count" id="player-hand-panel-hand-count" aria-label="当前手牌数"></span>
              <span class="player-hand-panel-title-hint" id="player-hand-panel-title-hint"></span>
            </div>
            <button class="play-card-action-button" type="button" id="play-card-action-button" hidden>打出</button>
            <button class="play-card-selection-cancel" type="button" id="play-card-selection-cancel" hidden>取消</button>
            <button class="card-corner-action-button" type="button" id="card-corner-action-button" hidden>弃牌换资源</button>
            <button class="move-payment-confirm" type="button" id="move-payment-confirm" hidden>确认移动</button>
            <button class="hand-scan-cancel" type="button" id="hand-scan-cancel" hidden>取消扫描</button>
            <button class="discard-selection-cancel" type="button" id="discard-selection-cancel" hidden>取消</button>
            <button class="move-payment-cancel" type="button" id="move-payment-cancel" hidden>取消</button>
          </div>
          <div class="player-hand-fan" id="player-hand-fan"></div>
        </section>
        <section class="table-panel reserved-card-panel is-empty" id="reserved-card-panel" aria-label="保留牌区">
          <div class="reserved-card-panel-header">
            <div class="panel-title">保留牌区</div>
          </div>
          <div class="reserved-card-content">
            <div class="initial-selection-area" id="initial-selection-area" hidden></div>
            <div class="reserved-card-fan" id="reserved-card-fan"></div>
          </div>
        </section>
      </section>

      <div class="board-shell" id="board-shell">
        <div class="wheel-wrap" id="wheel-wrap">
          <div class="fly-wrap fly-wrap-1">
            <div class="wheel wheel1" id="wheel-1"></div>
          </div>
          <div class="fly-wrap fly-wrap-2">
            <div class="wheel wheel2" id="wheel-2"></div>
          </div>
          <div class="fly-wrap fly-wrap-3">
            <div class="wheel wheel3" id="wheel-3"></div>
          </div>
          <div class="fly-wrap fly-wrap-4">
            <div class="wheel wheel4" id="wheel-4"></div>
          </div>

          <div class="sector-wrap" id="sector-wrap-1"></div>
          <div class="sector-wrap" id="sector-wrap-2"></div>
          <div class="sector-wrap" id="sector-wrap-3"></div>
          <div class="sector-wrap" id="sector-wrap-4"></div>

          <div class="sun" aria-hidden="true"></div>
          <div class="token-layer" id="token-layer" aria-label="已发射火箭"></div>
          <div class="move-arrow-layer" id="move-arrow-layer" hidden aria-label="火箭移动方向"></div>
        </div>
      </div>

      <div class="planets-reference" id="planets-reference" aria-label="星球位置参考贴图">
        <img src="../assets/core/background/planets.png" alt="星球位置参考贴图" width="1672" height="941" decoding="async">
        <div class="planets-token-layer" id="planets-token-layer" aria-label="手动放置在星球贴图上的标记"></div>
      </div>

    </main>

    <aside class="table-column table-column-right" aria-label="右侧游戏区域">
      <section class="table-panel tech-panel" id="tech-panel" aria-label="待拿取科技信息">
        <div class="tech-panel-header">
          <div class="panel-title" id="tech-panel-title">待拿取科技信息</div>
          <button class="tech-selection-cancel" type="button" id="tech-selection-cancel" hidden>取消</button>
        </div>
        <div class="tech-stage" id="tech-stage">
          <div class="tech-row tech-row-blue">
            <div class="tech-slot" data-tech-slot="blue1">
              <div class="tech-slot-stack">
                <div class="tech-tile-wrap" data-tech-wrap-for="blue1">
                  <img class="tech-tile" data-tech-id="blue1" src="../assets/tech_tile/blue1.png" alt="蓝色科技 1" width="175" height="246" decoding="async">
                  <img class="tech-first-take-overlay" data-tech-overlay-for="blue1" src="../assets/tech_tile/2vp.png" alt="" width="175" height="246" decoding="async" aria-hidden="true">
                </div>
                <img class="tech-bonus" data-tech-bonus-for="blue1" alt="" width="128" height="128" decoding="async" hidden>
              </div>
            </div>
            <div class="tech-slot" data-tech-slot="blue2">
              <div class="tech-slot-stack">
                <div class="tech-tile-wrap" data-tech-wrap-for="blue2">
                  <img class="tech-tile" data-tech-id="blue2" src="../assets/tech_tile/blue2.png" alt="蓝色科技 2" width="175" height="246" decoding="async">
                  <img class="tech-first-take-overlay" data-tech-overlay-for="blue2" src="../assets/tech_tile/2vp.png" alt="" width="175" height="246" decoding="async" aria-hidden="true">
                </div>
                <img class="tech-bonus" data-tech-bonus-for="blue2" alt="" width="128" height="128" decoding="async" hidden>
              </div>
            </div>
            <div class="tech-slot" data-tech-slot="blue3">
              <div class="tech-slot-stack">
                <div class="tech-tile-wrap" data-tech-wrap-for="blue3">
