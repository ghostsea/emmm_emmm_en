<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SETI 太阳系随机器</title>
  <link rel="stylesheet" href="./style.css?v=player-hand-4">
</head>
<body>
  <div class="app-wrap debug-collapsed" id="app-wrap">
    <aside class="table-column table-column-left" aria-label="左侧游戏区域">
      <section class="round-status-panel" aria-label="轮次信息">
        <div class="round-status-frame">
          <img class="round-status-bg" src="../assets/core/rotate.png" alt="" width="1984" height="2122" decoding="async" aria-hidden="true">
          <img
            class="round-status-token"
            id="round-status-token"
            src="../assets/tokens/rotate_state.png"
            alt=""
            width="512"
            height="512"
            decoding="async"
            aria-hidden="true"
          >
          <div class="round-status-circle">
            <span class="round-status-title">轮次</span>
            <span class="round-status-value">第 1 轮</span>
          </div>
        </div>
      </section>

      <section class="table-panel final-score-panel" aria-label="终局计分">
        <div class="panel-title">终局计分</div>
        <div class="final-score-grid">
          <img class="final-score-tile" data-final-id="a" src="../assets/final/final_a1.png" alt="终局计分 A1" width="747" height="1040" decoding="async">
          <img class="final-score-tile" data-final-id="b" src="../assets/final/final_b1.png" alt="终局计分 B1" width="747" height="1040" decoding="async">
          <img class="final-score-tile" data-final-id="c" src="../assets/final/final_c1.png" alt="终局计分 C1" width="747" height="1040" decoding="async">
          <img class="final-score-tile" data-final-id="d" src="../assets/final/final_d1.png" alt="终局计分 D1" width="747" height="1040" decoding="async">
        </div>
      </section>

      <section class="table-panel alien-panel" aria-label="外星人 1">
        <div class="alien-stack">
          <img class="alien-back" src="../assets/aliens/back.png" alt="外星人 1 牌背" width="777" height="1415" decoding="async">
          <img class="alien-state" src="../assets/aliens/state1.png" alt="外星人 1 状态" width="443" height="208" decoding="async">
        </div>
      </section>

      <section class="table-panel alien-panel" aria-label="外星人 2">
        <div class="alien-stack">
          <img class="alien-back" src="../assets/aliens/back.png" alt="外星人 2 牌背" width="777" height="1415" decoding="async">
          <img class="alien-state" src="../assets/aliens/state2.png" alt="外星人 2 状态" width="443" height="208" decoding="async">
        </div>
      </section>
    </aside>

    <div class="land-target-overlay" id="land-target-overlay" hidden>
      <div class="land-target-dialog" role="dialog" aria-modal="true" aria-labelledby="land-target-title">
        <p class="land-target-title" id="land-target-title">选择登陆目标</p>
        <label class="land-target-label" for="land-target-select">登陆到</label>
        <select class="land-target-select" id="land-target-select"></select>
        <div class="land-target-actions">
          <button class="land-target-button land-target-button-primary" type="button" id="land-target-confirm">确认登陆</button>
          <button class="land-target-button" type="button" id="land-target-cancel">取消</button>
        </div>
      </div>
    </div>

    <main class="board-column">
      <section class="player-command" id="player-command" aria-label="当前玩家">
        <div class="player-stats" id="player-stats" aria-live="polite"></div>
        <div class="action-bar" id="action-bar" aria-label="行动">
          <button class="action-button action-button-primary" type="button" id="action-launch-button">发射</button>
          <button class="action-button" type="button" id="action-orbit-button">环绕</button>
          <button class="action-button" type="button" id="action-land-button">登陆</button>
          <button class="action-button" type="button" disabled>扫描</button>
          <button class="action-button" type="button" disabled>分析</button>
          <button class="action-button" type="button" disabled>打牌</button>
          <button class="action-button" type="button" disabled>科技</button>
          <button class="action-button" type="button" id="action-quick-button" aria-expanded="false" aria-controls="quick-actions-panel">快速</button>
        </div>
        <div class="quick-actions-panel" id="quick-actions-panel" hidden aria-label="快速行动">
          <div class="quick-actions-row">
            <span class="quick-actions-label">兑换</span>
            <div class="quick-actions-trades" id="quick-actions-trades">
              <button class="quick-trade-button" type="button" data-quick-trade="credits-for-energy">2信用点 → 1能量</button>
              <button class="quick-trade-button" type="button" data-quick-trade="credits-for-card">2信用点 → 1张牌</button>
              <button class="quick-trade-button" type="button" data-quick-trade="cards-for-credit">2张牌 → 1信用点</button>
              <button class="quick-trade-button" type="button" data-quick-trade="cards-for-energy">2张牌 → 1能量</button>
              <button class="quick-trade-button" type="button" data-quick-trade="energy-for-card">2能量 → 1张牌</button>
              <button class="quick-trade-button" type="button" data-quick-trade="energy-for-credit">2能量 → 1信用点</button>
            </div>
          </div>
          <div class="quick-actions-row">
            <span class="quick-actions-label">移动</span>
            <select class="quick-move-select" id="quick-move-rocket-select" aria-label="选择要移动的火箭"></select>
            <div class="quick-move-pad" id="quick-move-pad" aria-label="移动所选火箭">
              <button class="quick-move-button" type="button" data-move-x="0" data-move-y="1">外</button>
              <button class="quick-move-button" type="button" data-move-x="-1" data-move-y="0">逆</button>
              <button class="quick-move-button" type="button" data-move-x="1" data-move-y="0">顺</button>
              <button class="quick-move-button" type="button" data-move-x="0" data-move-y="-1">内</button>
            </div>
          </div>
        </div>
        <div class="player-board-panel" aria-label="玩家版图">
          <img src="../assets/core/player_board.png" alt="玩家版图" width="960" height="329" decoding="async">
        </div>
        <section class="table-panel player-hand-panel" id="player-hand-panel" aria-label="玩家手牌区">
          <div class="panel-title">玩家手牌区</div>
          <div class="player-hand-fan" id="player-hand-fan"></div>
        </section>
      </section>

      <div class="board-shell" id="board-shell">
        <div class="wheel-wrap" id="wheel-wrap">
          <div class="fly-wrap fly-wrap-1">
            <div class="wheel wheel1" id="wheel-1"></div>
          </div>
          <div class="fly-wrap fly-wrap-2">
            <div class="wheel wheel2" id="wheel-2"></div>
          </div>
          <div class="fly-wrap fly-wrap-3">
            <div class="wheel wheel3" id="wheel-3"></div>
          </div>
          <div class="fly-wrap fly-wrap-4">
            <div class="wheel wheel4" id="wheel-4"></div>
          </div>

          <div class="sector-wrap" id="sector-wrap-1"></div>
          <div class="sector-wrap" id="sector-wrap-2"></div>
          <div class="sector-wrap" id="sector-wrap-3"></div>
          <div class="sector-wrap" id="sector-wrap-4"></div>

          <div class="sun" aria-hidden="true"></div>
          <div class="token-layer" id="token-layer" aria-label="已发射火箭"></div>
        </div>
      </div>

      <div class="planets-reference" id="planets-reference" aria-label="星球位置参考贴图">
        <img src="../assets/core/background/planets.png" alt="星球位置参考贴图" width="1672" height="941" decoding="async">
        <div class="planets-token-layer" id="planets-token-layer" aria-label="手动放置在星球贴图上的标记"></div>
      </div>

      <div class="button-wrap" id="button-wrap">
        <div class="connector" aria-hidden="true"></div>
        <button class="spin-button pulsin" type="button" id="spin-button" aria-label="随机设置太阳系与扇区"></button>
      </div>
    </main>

    <aside class="table-column table-column-right" aria-label="右侧游戏区域">
      <section class="table-panel tech-panel" aria-label="待拿取科技信息">
        <div class="panel-title">待拿取科技信息</div>
        <div class="tech-rows">
          <div class="tech-row">
            <img class="tech-tile" src="../assets/tech_tile/blue1.png" alt="蓝色科技 1" width="175" height="246" decoding="async">
            <img class="tech-tile" src="../assets/tech_tile/blue2.png" alt="蓝色科技 2" width="175" height="246" decoding="async">
            <img class="tech-tile" src="../assets/tech_tile/blue3.png" alt="蓝色科技 3" width="175" height="246" decoding="async">
            <img class="tech-tile" src="../assets/tech_tile/blue4.png" alt="蓝色科技 4" width="175" height="246" decoding="async">
          </div>
          <div class="tech-row">
            <img class="tech-tile" src="../assets/tech_tile/orange1.png" alt="橙色科技 1" width="175" height="246" decoding="async">
            <img class="tech-tile" src="../assets/tech_tile/orange2.png" alt="橙色科技 2" width="175" height="246" decoding="async">
            <img class="tech-tile" src="../assets/tech_tile/orange3.png" alt="橙色科技 3" width="175" height="246" decoding="async">
            <img class="tech-tile" src="../assets/tech_tile/orange4.png" alt="橙色科技 4" width="175" height="246" decoding="async">
          </div>
          <div class="tech-row">
            <img class="tech-tile" src="../assets/tech_tile/purple1.png" alt="紫色科技 1" width="175" height="246" decoding="async">
            <img class="tech-tile" src="../assets/tech_tile/purple2.png" alt="紫色科技 2" width="175" height="246" decoding="async">
            <img class="tech-tile" src="../assets/tech_tile/purple3.png" alt="紫色科技 3" width="175" height="246" decoding="async">
            <img class="tech-tile" src="../assets/tech_tile/purple4.png" alt="紫色科技 4" width="175" height="246" decoding="async">
          </div>
        </div>
      </section>

      <section class="table-panel public-card-panel" aria-label="公共牌区">
        <div class="panel-title">公共牌区</div>
        <div class="public-card-row">
          <img class="public-card" src="../assets/cards/card_back.png" alt="公共牌背面 1" width="747" height="1040" decoding="async">
          <img class="public-card" src="../assets/cards/card_back.png" alt="公共牌背面 2" width="747" height="1040" decoding="async">
          <img class="public-card" src="../assets/cards/card_back.png" alt="公共牌背面 3" width="747" height="1040" decoding="async">
        </div>
      </section>

      <section class="table-panel opponents-panel" aria-label="玩家信息统计">
        <div class="panel-title">玩家信息统计</div>
        <div class="opponent-stat-grid">
          <div class="opponent-stat-slot">玩家 1 状态</div>
          <div class="opponent-stat-slot">玩家 2 状态</div>
          <div class="opponent-stat-slot">玩家 3 状态</div>
          <div class="opponent-stat-slot">玩家 4 状态</div>
        </div>
      </section>
    </aside>

    <aside class="debug-dock" id="debug-dock">
      <button class="debug-toggle" type="button" id="debug-toggle" aria-controls="debug-panel" aria-expanded="false">调试</button>
      <div class="debug-panel" id="debug-panel">
        <div class="debug-actions">
          <button class="debug-action-button" type="button" id="debug-rotate-button">旋转</button>
          <button class="debug-action-button" type="button" id="debug-launch-button">发射</button>
          <button class="debug-action-button" type="button" id="debug-income-button">收入</button>
          <button class="debug-action-button" type="button" id="debug-draw-card-button">摸牌</button>
          <button class="debug-action-button" type="button" id="debug-discard-card-button">弃牌</button>
        </div>
        <div class="debug-move-pad" id="debug-move-pad" aria-label="移动当前火箭">
          <button class="debug-action-button debug-move-button" type="button" id="debug-move-up" data-move-x="0" data-move-y="1">外</button>
          <button class="debug-action-button debug-move-button" type="button" id="debug-move-left" data-move-x="-1" data-move-y="0">逆</button>
          <button class="debug-action-button debug-move-button" type="button" id="debug-move-right" data-move-x="1" data-move-y="0">顺</button>
          <button class="debug-action-button debug-move-button" type="button" id="debug-move-down" data-move-x="0" data-move-y="-1">内</button>
        </div>
      </div>
    </aside>

    <aside class="report-dock" id="report-dock">
      <button class="log-toggle" type="button" id="log-toggle" aria-controls="state-readout" aria-expanded="true">日志</button>
      <output class="state-readout" id="state-readout" aria-live="polite"></output>
    </aside>
  </div>

  <script src="./solar-system/layout.js?v=player-actions-4"></script>
  <script src="./solar-system/core.js?v=player-actions-4"></script>
  <script src="./game/basic-cards.js?v=player-hand-3"></script>
  <script src="./game/players.js?v=player-hand-1"></script>
  <script src="./game/rockets.js?v=planet-tokens-11"></script>
  <script src="./game/planet-reference-layout.js?v=planet-tokens-11"></script>
  <script src="./game/planet-stats.js?v=planet-tokens-11"></script>
  <script src="./game/actions/shared.js?v=planet-tokens-11"></script>
  <script src="./game/actions/launch.js?v=planet-tokens-11"></script>
  <script src="./game/actions/orbit.js?v=planet-tokens-11"></script>
  <script src="./game/actions/land.js?v=planet-tokens-11"></script>
  <script src="./game/actions/index.js?v=planet-tokens-11"></script>
  <script src="./game/actions/quick-trades.js?v=planet-tokens-11"></script>
  <script src="./app.js?v=player-hand-4"></script>
</body>
</html>
