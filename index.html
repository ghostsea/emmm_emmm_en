<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SETI Randomizer</title>
  <link rel="stylesheet" href="style.css">
  <script type="module" src="main.js"></script>
</head>
<body>
  <div class="app-wrap">
    <div class="title-block"></div>

    <div class="wheel-wrap">
      <div class="fly-wrap fly-wrap-4" data-wheel="4"><div class="wheel wheel4"></div></div>
      <div class="fly-wrap fly-wrap-3" data-wheel="3"><div class="wheel wheel3"></div></div>
      <div class="fly-wrap fly-wrap-2" data-wheel="2"><div class="wheel wheel2"></div></div>
      <div class="fly-wrap fly-wrap-1" data-wheel="1"><div class="wheel wheel1"></div></div>

      <div id="sector-wrap-1" class="sector-wrap"></div>
      <div id="sector-wrap-2" class="sector-wrap"></div>
      <div id="sector-wrap-3" class="sector-wrap"></div>
      <div id="sector-wrap-4" class="sector-wrap"></div>

      <div class="sun"></div>
    </div>

    <div class="button-wrap">
      <div class="button-connector"></div>
      <button type="button" class="set-button" aria-label="Randomize solar system set"></button>
    </div>
  </div>
</body>
</html>
